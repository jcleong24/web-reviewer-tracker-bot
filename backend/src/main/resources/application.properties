spring.application.name=web-reviewer-bot
server.port=8080

# --- PostgreSQL --------------------------------------------------------------
# All credentials come from the environment. NEVER hardcode them here.
# Required env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/webreviewer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Structural DDL lives in schema.sql; apply it on startup (statements are idempotent).
spring.sql.init.mode=always

# --- Anthropic ---------------------------------------------------------------
# ANTHROPIC_API_KEY is read from the environment by the Anthropic client.
# Model defaults to claude-opus-4-8; override with the ANTHROPIC_MODEL env var.
anthropic.model=${ANTHROPIC_MODEL:claude-opus-4-8}

# --- Analyze pipeline tuning -------------------------------------------------
webreviewer.fetch.timeout-ms=10000
webreviewer.extract.max-length=20000

# --- Playwright rendering fallback -------------------------------------------
# Off by default. When the fast RestClient fetch yields fewer than
# thin-threshold characters of text (likely a JS-rendered page), re-fetch with a
# headless browser and capture a screenshot to send to Opus alongside the text.
# Enabling requires Playwright browser binaries on the host:
#   mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"
# webreviewer.fetch.thin-threshold=500
webreviewer.fetch.thin-threshold=999999
webreviewer.fetch.playwright.enabled=${WEBREVIEWER_PLAYWRIGHT_ENABLED:false}
webreviewer.fetch.playwright.timeout-ms=15000
# false = above-the-fold viewport screenshot (cheaper); true = full page.
webreviewer.fetch.playwright.full-page=false

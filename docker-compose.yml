# Local PostgreSQL for web-reviewer-bot development.
#
# Uses the SAME env vars the backend reads, so the container and the app stay
# in sync automatically. No password is baked into this file — you must set
# SPRING_DATASOURCE_PASSWORD before starting (matches the backend, which also
# has no password default).
#
#   $env:SPRING_DATASOURCE_USERNAME = "webreviewer"   # optional (defaults below)
#   $env:SPRING_DATASOURCE_PASSWORD = "choose-a-dev-password"
#   docker compose up -d
#
# The DB name (webreviewer) and port (5432) match the backend's default
# SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/webreviewer

services:
  db:
    image: postgres:16
    container_name: webreviewer-db
    environment:
      POSTGRES_DB: webreviewer
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-webreviewer}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD before starting the DB}
    ports:
      - "5432:5432"
    volumes:
      - webreviewer-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-webreviewer} -d webreviewer"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  webreviewer-pgdata:
